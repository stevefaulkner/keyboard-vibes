name: Keyboard Operability Responsive Audit

on:
  pull_request:
  workflow_dispatch:

jobs:
  keyboard-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run install:browsers
      - name: Run responsive keyboard audit
        run: |
          npm run test:keyboard -- \
            --url https://example.com \
            --output-dir reports \
            --responsive \
            --screenshots \
            --visualize
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: keyboard-audit-responsive-reports
          path: reports/
